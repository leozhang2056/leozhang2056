# 行为面试问题库 (STAR 方法)
# Behavioral Interview Q&A using STAR Method

questions:
  - id: greatest_strength
    category: self_awareness
    question: "What is your greatest strength?"
    difficulty: easy
    answer_points:
      - "Ability to bridge research and engineering - can read papers AND ship production code"
      - "Evidence: ChatClothes thesis - took cutting-edge diffusion research to working edge deployment"
      - "10 years of software engineering discipline applied to AI projects"
    evidence:
      - project: chatclothes
        highlight: "Full-stack AI solution from research to edge deployment"
    alternative_strengths:
      - strength: "Resilience and self-learning"
        evidence: "Self-taught AI while working full-time, completed Master's with early submission"
      - strength: "System thinking"
        evidence: "Smart Factory - designed microservices architecture supporting 5+ sites"
    tips:
      - "Choose strength relevant to the role"
      - "Have specific evidence ready"
      - "Avoid generic answers like 'hardworking'"

  - id: greatest_weakness
    category: self_awareness
    question: "What is your greatest weakness?"
    difficulty: easy
    answer_points:
      - "Sometimes dive too deep into technical details when mentoring"
      - "Working on: focusing on high-level concepts first, then deep dives when needed"
      - "Improved: created structured onboarding docs with progressive detail levels"
    evidence:
      - project: smart-factory
        highlight: "Mentored team members, established documentation standards"
    framing: "Real weakness + active improvement + evidence of progress"
    avoid:
      - "Fake weaknesses ('I work too hard')"
      - "Critical job requirements"
      - "Personal life weaknesses"
    tips:
      - "Choose a real but not critical weakness"
      - "Show self-awareness and growth mindset"
      - "Have concrete improvement steps"

  - id: failure_experience
    category: resilience
    question: "Tell me about a time you failed"
    difficulty: medium
    answer_points:
      - "Chinese Herbal Recognition: initially underestimated data annotation effort"
      - "Planned 2 weeks for annotation, took 6 weeks due to quality requirements"
      - "Impact: delayed model training phase, had to adjust project timeline"
      - "Learned: now always prototype annotation workflow before estimating"
    evidence:
      - project: chinese-herbal-recognition
        highlight: "Learned importance of data pipeline design"
    star_method:
      Situation: "Platform project with tight deadline"
      Task: "Deliver trained model with custom dataset"
      Action: "Initially used linear annotation approach, realized too slow"
      Result: "Delayed but delivered; implemented better workflow for future projects"
    lessons_learned:
      - "Data quality matters more than quantity"
      - "Always validate annotation workflow with small sample first"
      - "Build feedback loops into data pipeline"
    tips:
      - "Choose real failure with learning"
      - "Own the failure, don't blame others"
      - "Show how you applied the lesson"

  - id: disagreement_with_manager
    category: conflict_resolution
    question: "Tell me about a time you disagreed with your manager"
    difficulty: hard
    answer_points:
      - "Smart Factory: manager wanted to add more features before launch, I advocated for MVP"
      - "Concern: feature creep delaying value delivery to factory workers"
      - "Resolution: proposed A/B test - launch core features, measure adoption"
      - "Result: core features well-received, additional features added incrementally"
    evidence:
      - project: smart-factory
        highlight: "Delivered scalable architecture, 30% efficiency improvement"
    star_method:
      Situation: "Launch deadline approaching, scope expanding"
      Task: "Deliver value to users while managing technical debt"
      Action: "Presented user research data, proposed phased rollout"
      Result: "Successful launch, manager appreciated data-driven approach"
    tips:
      - "Show respect for authority while standing your ground"
      - "Use data to support your position"
      - "Emphasize positive outcome and relationship preservation"

  - id: worked_with_difficult_person
    category: interpersonal
    question: "Tell me about a time you worked with a difficult person"
    difficulty: medium
    answer_points:
      - "Enterprise Messaging: team member resistant to code review feedback"
      - "Approach: private conversation to understand concerns"
      - "Discovered: previous negative experience with public criticism"
      - "Solution: shifted to private feedback, paired on improvements"
    evidence:
      - project: enterprise-messaging
        highlight: "Facilitated version releases, coordinated with QA and client teams"
    star_method:
      Situation: "Team conflict affecting code quality"
      Task: "Maintain code standards while preserving team harmony"
      Action: "One-on-one to understand root cause, adjusted communication style"
      Result: "Improved code quality and team relationship"
    tips:
      - "Don't badmouth the person"
      - "Focus on your actions and the resolution"
      - "Show empathy and adaptability"

  - id: went_above_beyond
    category: initiative
    question: "Tell me about a time you went above and beyond"
    difficulty: medium
    answer_points:
      - "ChatClothes: thesis requirement was working demo, I delivered complete deployment docs"
      - "Extra: created API documentation, user manual, and deployment guide"
      - "Impact: thesis submitted 6 months early, system actually deployable by others"
      - "Recognition: supervisor praised completeness and professionalism"
    evidence:
      - project: chatclothes
        highlight: "Submitted 6 months early with comprehensive deployment documentation"
    star_method:
      Situation: "Thesis requirement: working demo"
      Task: "Deliver research project"
      Action: "Went beyond requirements with full documentation and deployment guides"
      Result: "Early submission, system usable by others, strong supervisor feedback"
    tips:
      - "Choose example showing intrinsic motivation"
      - "Quantify impact when possible"
      - "Connect to company values if known"

  - id: prioritize_multiple_tasks
    category: time_management
    question: "How do you prioritize when you have multiple deadlines?"
    difficulty: medium
    answer_points:
      - "Framework: Impact vs Effort matrix, stakeholder communication"
      - "Example: Smart Factory - production bug vs feature request"
      - "Decision: fixed bug first (high impact, low effort), then feature"
      - "Communication: transparent with stakeholders about reprioritization"
    evidence:
      - project: smart-factory
        highlight: "Maintained 99.9% uptime while delivering new features"
    prioritization_framework:
      - "Urgent + Important: Do first (production issues)"
      - "Important + Not Urgent: Schedule (feature development)"
      - "Urgent + Not Important: Delegate if possible"
      - "Neither: Eliminate or postpone"
    tips:
      - "Show systematic approach, not just 'work harder'"
      - "Mention stakeholder communication"
      - "Give specific example"

  - id: handle_stress_pressure
    category: stress_management
    question: "How do you handle stress and pressure?"
    difficulty: medium
    answer_points:
      - "Prevention: breaking large tasks into milestones, regular progress checks"
      - "During pressure: focus on controllable factors, temporary scope reduction if needed"
      - "Recovery: exercise, outdoor activities (why I chose NZ)"
      - "Example: ChatClothes thesis - early planning allowed early submission"
    evidence:
      - project: chatclothes
        highlight: "Submitted 6 months early through effective planning"
    stress_management_techniques:
      - "Time blocking and Pomodoro technique"
      - "Regular exercise (hiking, running)"
      - "Mindfulness and meditation"
      - "Clear work-life boundaries"
    tips:
      - "Show healthy coping mechanisms"
      - "Avoid 'I don't get stressed'"
      - "Connect to sustained performance"

  - id: describe_work_style
    category: self_awareness
    question: "How would you describe your work style?"
    difficulty: easy
    answer_points:
      - "Systems thinker: understand big picture before diving into details"
      - "Evidence-based: validate assumptions with data or prototypes"
      - "Collaborative: prefer pair programming and code review"
      - "Continuous improver: always looking for better ways to do things"
    evidence:
      - project: smart-factory
        highlight: "Championed agile practices and documentation"
      - project: chatclothes
        highlight: "Iterative refinement through experimental validation"
    work_style_keywords:
      - "Analytical"
      - "Collaborative"
      - "Results-oriented"
      - "Adaptable"
    tips:
      - "Match to company culture if known"
      - "Give specific examples"
      - "Show self-awareness"

  - id: motivation_at_work
    category: motivation
    question: "What motivates you at work?"
    difficulty: easy
    answer_points:
      - "Solving real problems: Smart Factory efficiency improvements helped actual workers"
      - "Learning new things: self-taught AI, completed Master's while working"
      - "Building things that last: systems still running after 6+ years"
      - "Mentoring others: seeing team members grow"
    evidence:
      - project: smart-factory
        highlight: "30%+ production efficiency improvement, system running 6+ years"
      - project: chatclothes
        highlight: "Self-directed learning resulting in research contribution"
    motivation_factors:
      - "Impact on users/business"
      - "Intellectual challenge"
      - "Ownership and autonomy"
      - "Growth and learning"
      - "Team success"
    tips:
      - "Be genuine, not what you think they want to hear"
      - "Connect to role requirements"
      - "Show intrinsic motivation"

  - id: teamwork_example
    category: interpersonal
    question: "Tell me about a time you worked effectively in a team"
    difficulty: medium
    answer_points:
      - "Smart Factory: 6-person cross-functional team (Android, backend, hardware)"
      - "Challenge: different priorities and timelines"
      - "Approach: shared backlog, sprint sync, clear ownership per module"
      - "Result: delivered across 5+ factory sites, 99.9% uptime"
    evidence:
      - project: smart-factory
        highlight: "Led cross-functional team, agile practices, on-time delivery"
    star_method:
      Situation: "Multi-site manufacturing platform with mixed skills"
      Task: "Deliver integrated system (mobile + backend + IoT)"
      Action: "Aligned on architecture, defined interfaces, regular demos"
      Result: "Deployed to 5+ sites, maintained uptime"
    tips:
      - "Pick example with clear outcome"
      - "Mention your specific role, not just 'we'"
      - "Show communication and coordination"

  - id: feedback_received
    category: self_awareness
    question: "Tell me about feedback you received and how you acted on it"
    difficulty: medium
    answer_points:
      - "Smart Factory: manager suggested I document architecture decisions for handover"
      - "Action: created ADR-style docs and onboarding guide for new developers"
      - "Result: faster onboarding, less repeated questions"
      - "Ongoing: now document key decisions by default"
    evidence:
      - project: smart-factory
        highlight: "Championed agile practices and documentation"
    tips:
      - "Choose feedback that shows growth"
      - "Show concrete action, not just 'I listened'"
      - "Positive framing"

  - id: learn_new_tech_quickly
    category: learning
    question: "Describe a time you had to learn a new technology quickly"
    difficulty: medium
    answer_points:
      - "ChatClothes: had to go from traditional ML to diffusion models and LoRA in months"
      - "Approach: papers, official repos, small experiments, then full pipeline"
      - "Leveraged: 10 years of software engineering to focus on pipeline and deployment"
      - "Result: working thesis with edge deployment in limited time"
    evidence:
      - project: chatclothes
        highlight: "Full-stack AI solution, LoRA fine-tuning, edge deployment"
    tips:
      - "Show structured learning, not just 'I read a lot'"
      - "Connect prior experience to faster learning"
      - "Mention deliverable or outcome"

  - id: stay_current_with_technology
    category: learning
    question: "How do you keep your technical knowledge up to date?"
    difficulty: easy
    answer_points:
      - "Use a layered routine: official docs/releases, trusted engineering blogs, and weekly hands-on experiments"
      - "Convert learning into outputs: short notes, mini prototypes, or internal sharing"
      - "Prioritize topics that map to current work instead of random trend-following"
      - "Example: ChatClothes - moved from paper reading to LoRA experiments, then production-ready edge pipeline"
    evidence:
      - project: chatclothes
        highlight: "Turned fast AI learning into a complete deployed system"
    tips:
      - "Show a repeatable method, not just 'I watch videos'"
      - "Mention how you validate and apply new knowledge"
      - "Connect learning directly to business delivery"

  - id: code_quality_practice
    category: execution
    question: "How do you assure code quality in your team?"
    difficulty: medium
    answer_points:
      - "Quality gates: coding standards, mandatory code review, CI checks, and regression tests"
      - "Risk-based testing for critical user journeys before release"
      - "Post-release discipline: monitoring, fast rollback path, and incident review"
      - "Example: long-running Smart Factory platform maintained stable releases and high uptime"
    evidence:
      - project: smart-factory
        highlight: "Sustained delivery quality with 99.9% uptime"
      - project: enterprise-messaging
        highlight: "High-concurrency releases coordinated with QA and backend teams"
    tips:
      - "Cover prevention, detection, and recovery"
      - "Use one concrete release example"
      - "Emphasize team process, not heroics"

  - id: agile_workflow_experience
    category: collaboration
    question: "Describe the project workflow in your previous team"
    difficulty: medium
    answer_points:
      - "Two-week sprint cadence with planning, daily stand-up, review/demo, and retrospective"
      - "Backlog refinement aligned business priority with engineering effort"
      - "Interface contracts and early integration reduced cross-team rework"
      - "Outcome: predictable delivery across mobile, backend, and IoT dependencies"
    evidence:
      - project: smart-factory
        highlight: "Cross-functional delivery over multiple years and sites"
    tips:
      - "Describe the real loop, not textbook terms"
      - "Include one mechanism that improved predictability"
      - "Tie workflow to measurable outcomes"

  - id: mentor_junior_developer
    category: leadership
    question: "How do you support and track a junior developer's progress?"
    difficulty: medium
    answer_points:
      - "Set clear 30/60/90-day goals with scoped tasks and expected outcomes"
      - "Use pairing + code review comments as daily coaching channels"
      - "Run weekly 1:1 check-ins for blockers, feedback, and learning plan adjustments"
      - "Measure progress by quality, independence, and delivery reliability, not just ticket count"
    evidence:
      - project: smart-factory
        highlight: "Mentored team members with structured onboarding and documentation"
    tips:
      - "Balance support and ownership"
      - "Use objective checkpoints"
      - "Show how feedback turns into action"

  - id: disagree_and_commit
    category: conflict_resolution
    question: "How do you handle professional disagreement in a team?"
    difficulty: medium
    answer_points:
      - "First align on shared goal: user impact and delivery risk"
      - "Use evidence (metrics, prototype, or user feedback) instead of opinions"
      - "Debate openly during planning, then commit fully once a decision is made"
      - "If trade-offs remain, record follow-up improvement tickets instead of blocking progress"
    evidence:
      - project: smart-factory
        highlight: "Resolved scope and design disagreements through phased rollout decisions"
    tips:
      - "Show backbone and collaboration together"
      - "Avoid personal language"
      - "Demonstrate 'disagree and commit' maturity"
