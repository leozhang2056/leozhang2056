# 面试问题库索引
# Interview Q&A Library Index
#
# 使用说明：
# 1. 根据面试类型选择对应的问题库文件
# 2. 每个问题包含回答要点、证据引用和回答技巧
# 3. 使用 STAR 方法组织行为面试回答
# 4. 所有回答必须与 kb/ 和 projects/ 中的事实一致

library_structure:
  technical:
    file: technical.yaml
    description: "通用技术面试问题"
    topics:
      - 自我介绍和职业经历
      - 职业转型问题
      - 项目深入讨论
      - 问题解决能力
      - 系统设计
    
  behavioral:
    file: behavioral.yaml
    description: "行为面试问题 (STAR 方法)"
    topics:
      - 自我认知 (优势/劣势)
      - 冲突解决
      - 抗压能力
      - 团队协作
      - 主动性
    
  role_specific:
    file: role_specific.yaml
    description: "岗位特定问题"
    sections:
      - android_questions: Android 开发
      - backend_questions: 后端开发
      - ai_ml_questions: AI/ML 工程
      - iot_questions: IoT 开发
      - leadership_questions: 技术领导
      - company_research_questions: 公司研究

usage_guide:
  before_interview:
    - "根据目标岗位选择相关的问题类别"
    - "复习对应的 evidence 项目细节"
    - "准备 3-5 个 STAR 格式的完整故事"
    - "研究目标公司，准备定制化问题"
  
  during_interview:
    - "听清问题后，选择最相关的 evidence"
    - "使用 STAR 方法组织回答"
    - "量化成果，引用具体数据"
    - "保持回答简洁，2-3 分钟为宜"
  
  after_interview:
    - "记录被问到的问题和回答效果"
    - "更新本库，添加新的问题和改进"
    - "反思哪些 evidence 最有效"

star_method_guide:
  Situation: "背景是什么？涉及哪些人？"
  Task: "你的具体任务/目标是什么？"
  Action: "你具体做了什么？（重点，占 60%）"
  Result: "结果如何？量化成果？学到了什么？"

common_pitfalls:
  - "不要编造经历 - 所有回答必须有 evidence 支持"
  - "不要过度谦虚 - 适当展示自己的贡献"
  - "不要只讲团队 - 明确说明你的个人角色"
  - "不要跑题 - 保持回答聚焦问题"
  - "不要负面评价前雇主/同事"

preparation_checklist:
  technical:
    - "复习所有项目的 facts.yaml 细节"
    - "准备 2-3 个技术深入讨论的项目"
    - "思考技术选型的 trade-offs"
  
  behavioral:
    - "准备 5 个完整的 STAR 故事"
    - "涵盖：领导力、冲突、失败、成就、压力"
    - "练习在 2 分钟内讲完"
  
  company_research:
    - "阅读公司技术博客"
    - "了解产品和技术栈"
    - "准备 3-5 个问面试官的问题"

last_updated: "2025-03"
