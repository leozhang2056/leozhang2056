# 项目关联关系图
# Project Relations Graph
# 
# 用于 AI 理解项目间的技能传承和技术关联
# 帮助生成更连贯的简历叙事

relations:
  # ============================================
  # 技能传承关系 (Skill Progression)
  # ============================================
  
  - from: patent-search-system
    to: live-streaming-system
    type: tech_stack_evolution
    description: ".NET 2.0 到 .NET 4.x 的技术演进，扩展至多语言架构"
    shared_skills:
      - .NET Framework Development
      - SQL Server Database Design
      - Enterprise Application Architecture
      - C# Programming
    progression:
      - ".NET 2.0 (WinForms) → .NET 4.x (ASP.NET)：技术栈升级"
      - "桌面应用 → Web 应用 + 移动应用：全栈能力扩展"
      - "单一 C# → 多语言 (C#, C++, Python, Lua)：复杂系统架构"
    dotnet_evolution:
      - ".NET Framework 2.0 → 4.5：利用新特性优化性能"
      - "WinForms → ASP.NET Web Forms：Web 开发能力建立"
      - "ADO.NET 2.0 → Entity Framework：数据访问技术升级"

  - from: live-streaming-system
    to: enterprise-messaging
    type: tech_stack_transition
    description: ".NET 全栈向 Java 生态的扩展，保留多语言架构经验"
    shared_skills:
      - Multi-language System Architecture
      - Real-time Communication Systems
      - Cross-platform Client Development
      - Enterprise Backend Design
    progression:
      - ".NET (C#, C++, Python, Lua) → Java (Java, C++, Kotlin)：多语言能力迁移"
      - "ASP.NET Web → Spring Cloud Microservices：Web 后端技术转换"
      - "Android Streaming Client → Android Messaging Client：移动端能力复用"
    multi_language_experience:
      - "C++ 媒体处理核心 → C++ NDK 消息协议实现"
      - "Python 数据分析 → Python AI/ML 数据处理"
      - "Lua 配置脚本 → 业务规则引擎经验"

  - from: enterprise-messaging
    to: smart-factory
    type: skill_progression
    description: "从纯软件开发扩展到工业 IoT 集成"
    shared_skills:
      - Java
      - Spring Boot
      - REST API
      - Team Leadership
    progression:
      - "企业消息系统 → 智能工厂：从纯软件到软硬结合"
      - "TCP/UDP 通信 → 串口/RFID 硬件通信"
      - "单体应用 → 微服务架构"

  - from: smart-factory
    to: iot-solutions
    type: skill_progression
    description: "工业 IoT 经验扩展到消费级 IoT 产品"
    shared_skills:
      - IoT Integration
      - Android Hardware
      - MQTT
    progression:
      - "工业场景 → 消费场景"
      - "工厂设备 → 智能家居设备"

  - from: smart-factory
    to: picture-book-locker
    type: skill_progression
    description: "RFID/条码经验应用于智能柜产品"
    shared_skills:
      - RFID
      - Barcode
      - Android Hardware Control

  - from: smart-factory
    to: visual-gateway
    type: skill_progression
    description: "工业控制经验应用于能源管理"
    shared_skills:
      - Serial Communication
      - Device Control
      - Android Gateway

  # ============================================
  # 技术栈演进 (Tech Stack Evolution)
  # ============================================

  - from: enterprise-messaging
    to: chatclothes
    type: tech_evolution
    description: "从传统后端到 AI 全栈"
    evolution_path:
      - "Java Backend → Python AI/ML"
      - "REST API → Diffusion Models"
      - "Mobile App → Multimodal AI System"
    narrative: "10年后端经验为 AI 系统架构奠定基础"

  - from: device-maintenance-prediction
    to: chatclothes
    type: tech_evolution
    description: "从传统 ML 到深度学习"
    evolution_path:
      - "Random Forest → Deep Learning"
      - "Scikit-learn → PyTorch"
      - "Tabular Data → Computer Vision"

  - from: chinese-herbal-recognition
    to: chatclothes
    type: tech_evolution
    description: "CV 平台经验应用于 VTON 研究"
    evolution_path:
      - "Image Classification → Diffusion Models"
      - "Model Training Pipeline → End-to-End AI System"
      - "Web Platform → Research System"

  # ============================================
  # 领域扩展 (Domain Expansion)
  # ============================================

  - from: forest-patrol-inspection
    to: exhibition-robot
    type: domain_expansion
    description: "从户外 GIS 到室内机器人"
    shared_skills:
      - GPS/Navigation
      - Sensor Integration
      - Real-time Systems
    expansion:
      - "野外地图 → 室内 SLAM"
      - "人工巡检 → 自动导览"

  - from: broadcast-control
    to: live-streaming-system
    type: domain_expansion
    description: "从广告播控到直播电商"
    shared_skills:
      - Video Streaming
      - Content Delivery
      - Android Client
    expansion:
      - "单向播放 → 双向互动"
      - "广告系统 → 电商直播"

  # ============================================
  # 技术复用 (Technology Reuse)
  # ============================================

  - from: school-attendance
    to: visit-system
    type: technology_reuse
    description: "人脸识别技术复用"
    shared_technology:
      - Face Recognition
      - Camera Integration
      - Access Control

  - from: smart-power
    to: visual-gateway
    type: technology_reuse
    description: "能源监控技术复用"
    shared_technology:
      - Power Monitoring
      - Data Collection
      - Alert System

  - from: picture-book-locker
    to: iot-solutions
    type: technology_reuse
    description: "智能柜控制技术复用"
    shared_technology:
      - Lock Control
      - Sensor Management
      - Android SDK

  # ============================================
  # 研究-工程桥梁 (Research-Engineering Bridge)
  # ============================================

  - from: chatclothes
    to: chinese-herbal-recognition
    type: research_engineering
    description: "研究项目与工程平台的互补"
    bridge:
      research_side: "ChatClothes - 前沿 AI 研究"
      engineering_side: "中药识别 - 工程化平台"
      synergy: "研究经验指导平台设计，平台能力支撑研究落地"

  # ============================================
  # 时间线分组 (Timeline Groups)
  # ============================================

timeline_groups:
  early_career:
    period: "2013-2014"
    projects:
      - patent-search-system
      - enterprise-messaging
      - system-administration
    theme: "基础技能建立期"
    
  growth_phase:
    period: "2014-2018"
    projects:
      - enterprise-messaging
      - smart-factory
      - broadcast-control
      - live-streaming-system
    theme: "全栈能力扩展期"
    
  leadership_phase:
    period: "2018-2023"
    projects:
      - smart-factory
      - iot-solutions
      - picture-book-locker
      - forest-patrol-inspection
      - school-attendance
      - visit-system
      - visual-gateway
      - smart-power
      - exhibition-robot
    theme: "技术领导力建立期"
    
  ai_transition:
    period: "2023-2024"
    projects:
      - device-maintenance-prediction
      - chinese-herbal-recognition
    theme: "AI 技能转型期"
    
  research_phase:
    period: "2024-2025"
    projects:
      - chatclothes
    theme: "研究深造期"

