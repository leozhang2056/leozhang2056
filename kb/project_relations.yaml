# ============================================
# 叙事线索 (Narrative Threads)
# 用于生成连贯的职业故事
# ============================================

narrative_threads:
  full_stack_evolution:
    title: "从全栈工程师到 AI 研究者"
    projects:
      - enterprise-messaging
      - smart-factory
      - chatclothes
    story: >
      从企业级消息系统起步，建立扎实的 Java 后端和 Android 开发基础。
      随后领导智能工厂项目，扩展了 IoT 集成和团队管理能力。
      最终转向 AI 领域，将工程经验应用于虚拟试衣研究，
      实现了从传统软件工程到 AI 工程的完整转型。

  iot_expertise:
    title: "IoT 系统集成专家"
    projects:
      - smart-factory
      - picture-book-locker
      - visual-gateway
      - iot-solutions
    story: >
      在智能工厂项目中积累了深厚的工业 IoT 经验，
      涵盖 RFID、条码、串口通信等多种硬件协议。
      这些经验被成功应用于智能柜、能源管理、智能家居等多个产品领域，
      形成了完整的 IoT 解决方案能力。

  ai_researcher:
    title: "AI 工程化实践者"
    projects:
      - device-maintenance-prediction
      - chinese-herbal-recognition
      - chatclothes
    story: >
      从预测性维护项目开始接触机器学习，
      通过中药识别平台深入理解 CV 模型训练和部署，
      最终在硕士研究中完成了前沿的虚拟试衣系统，
      展现了从传统 ML 到深度学习、从工程应用到学术研究的完整路径。
