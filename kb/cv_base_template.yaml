# Stable CV base template.
# This file is the human-approved content layer. Generation may make small,
# KB-supported JD adjustments, but should not freely rewrite these sections.

version: 1
policy:
  summary_mode: locked_five_sentences
  skills_mode: locked_lines
  jd_adjustment:
    - Keep the base wording as the source of truth.
    - Only inject KB-supported JD terms into summary sentence 1 when useful.
    - Do not add unsupported skills or rewrite the whole summary.
    - Keep Key Skills line labels and order stable.

roles:
  android:
    summary_sentences:
      en:
        - Senior Android Software Engineer with 10+ years of experience building production mobile applications using Kotlin, Java, Jetpack Compose, and modern Android architecture.
        - Specialized in scalable Android systems, real-time communication, and hardware-integrated workflows across industrial IoT and enterprise environments.
        - Proven success delivering stable mobile platforms with performance optimization, CI/CD workflows, and backend system integration.
        - Additional strengths include cross-functional engineering collaboration and applied AI for mobile and edge-device workflows.
        - Master of Computer and Information Sciences, First Class Honours, Auckland University of Technology.
    key_skills:
      en:
        - label: Android Development
          skills: [Jetpack Compose, MVVM, Coroutines & Flow, NDK, Android Security, React Native, Automated Testing, App Store Deployment]
        - label: Software Engineering
          skills: [Clean Architecture, Performance Optimization, Maintainability, Code Review, Cross-functional Collaboration]
        - label: Backend & APIs
          skills: [Spring Cloud, RESTful APIs, MySQL, Redis]
        - label: Tools & DevOps
          skills: [Git, CI/CD, Docker, Jenkins, Agile/Scrum]
        - label: AI & Emerging Technologies
          skills: [LLM Integration, Multimodal Systems, On-device Inference]

