  android:
    summary_sentences:
      en:
        - Senior Android Software Engineer with 10+ years of experience building production mobile applications using Kotlin, Java, and modern Android architecture.
        - Specialized in scalable Android systems, real-time communication, and hardware-integrated workflows across enterprise environments.
        - Proven success delivering stable mobile platforms through performance optimization, CI/CD automation, and backend service integration.
        - Experienced in technical design, code quality improvement, and translating complex product requirements into maintainable components.
        - Additional strengths include cross-functional engineering collaboration and applied AI for mobile and edge-device workflows.
