      en:
        - Senior Android Software Engineer with 10+ years of experience building production mobile applications using Kotlin, Java, Jetpack Compose, and modern Android architecture.
        - Specialized in scalable Android systems, real-time communication, and hardware-integrated workflows across enterprise environments.
        - Proven success delivering stable mobile platforms with performance optimization, CI/CD workflows, and backend system integration.
