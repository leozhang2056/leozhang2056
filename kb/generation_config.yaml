# Project selection policy — controls which projects are included/excluded/pinned.
# Keeping this here means you never need to touch Python code to adjust the CV narrative.
project_selection:
  # Projects never shown on CV regardless of JD score
  excluded_ids:
    - exhibition-robot

  # Projects always included; per-role overrides take precedence over 'default'
  pinned_ids:
    android:
      - enterprise-messaging
      - android-performance-optimization
      - android-hotfix-framework
      - smart-factory
      - iot-solutions
      - boobit
      - picture-book-locker
      - forest-patrol-inspection
      - chatclothes
    fullstack:
      - smart-factory
      - iot-solutions
      - picture-book-locker
      - smart-power
    embedded:
      - iot-solutions
      - smart-factory
      - field-weighing-access-control
    default:
      - chatclothes
      - smart-factory

  # When a slot is freed (e.g. exclusion), prefer these projects to fill it
  preferred_replacements:
    - picture-book-locker
    - smart-power
    - iot-solutions
