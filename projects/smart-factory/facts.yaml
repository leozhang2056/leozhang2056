summary: >
  Smart manufacturing platform rolled out to 10+ factories over six years: Android shop-floor apps,
  Spring Boot microservices, and IoT hooks (RFID, scales, conveyors) focused on stable shop-floor workflows.

  Also delivered Vue.js portals and cross-functional delivery spanning customer, operations, and worker journeys.

summary_cn: '智能制造平台，已部署于10多家工厂，实现自动化和数字化转型，以满足快速变化的市场需求。
  设计和开发全栈解决方案，包括前端门户、后端微服务、安卓应用和物联网设备集成，
  涵盖电子秤、工业洗衣机和传送系统。'
highlights:
  - Delivered a smart factory platform rolled out to 10+ factories over six years, spanning Android shop-floor apps, microservices, and IoT integrations
  - Implemented event-driven service coordination using ActiveMQ and Kafka to decouple production workflows across microservices
  - Dockerized Spring Boot microservices for repeatable releases across multi-site factory deployments and safer rollout operations
  - Replaced copy-and-sync manual releases with Jenkins integrated to GitLab, implementing CI/CD pipelines for automated build and deploy; initial pipeline and environment wiring was heavy, piloted on the factory program first, then migrated remaining delivery streams to the same workflow (alongside checklists and concise runbooks)
  - Integrated industrial IoT devices including RFID, electronic scales, and conveyor systems
  - Reduced shop-floor weighing friction on Windows + web workflows by bridging scale serial output through a local Windows service (serial listener + embedded WebSocket server) to the browser client, auto-inserting weight at the active field so operators no longer read the scale and re-type into the form
  - Implemented polyglot persistence layer with MySQL, Redis, and MongoDB for real-time data sync
  - Led a 6-person cross-functional engineering team through planning, sprint execution, and production rollout
  - Field-led prioritization with no off-the-shelf reference product; deep shop-floor engagement to clarify fuzzy requirements; fast prototyping and iterative validation with users; successive major releases expanded and trimmed scope as real adoption and feedback emerged under high ambiguity and delivery pressure
  - >-
    Production MySQL grew quickly (notably a high-volume daily task table on the order of ~100k+ new rows per day,
    reaching millions of rows within roughly half a year) while many portal queries joined that table; UI list/detail
    queries slowed enough to affect shop-floor operations. Trade-off between pausing feature work for a deep rewrite vs
    keeping shipping: temporarily migrated the database workload to cloud-hosted MySQL with higher provisioned capacity
    and read-scaling (primary plus read-replica style routing for heavy read paths) to buy time; scheduled root-cause
    slow-query and schema/index work after committed feature milestones, then planned repatriation back on-prem to reduce
    recurring hosting cost once optimizations landed
  - >-
    Team cadence layered on two-week sprints: daily standups for same-day plan alignment; end-of-day task-board review for
    landed vs slipped work; encourage early asks when blocked instead of surprising the team at week-end
  - >-
    Engineering hygiene on top of GitLab/Jenkins CI/CD: CI/static-analysis gates for low-level defects; merge requests
    through pair or cross-review before main; spot-check risky diffs on major releases; junior onboarding with concise
    checklists and common style baselines (e.g. Alibaba Java Development Guide) under Spring/Spring Cloud convention-first practice
  - >-
    Mentoring within the ~6-person cross-functional team: qualitative 30/60/90 milestones, weekly integrated demos as the
    visible progress bar, coaching-style code review (give direction, let juniors implement), periodic junior check-ins,
    and MR/commit hygiene reviews—not ticket-count theater
  - >-
    Regular internal tech talks anchored to real pilots or shipped tools: what customer pain was solved, what the tool is
    good at, and when not to use it; kept sessions short with Q&A so juniors heard the “why” before the first painful review thread

highlights_cn:
- 设计并开发完整的智能工厂系统，采用多端架构
- 构建用户门户、管理控制台、组长工作台和平台管理端
- 集成工业物联网设备：吊挂传送系统、电子秤、工业洗衣机、工业平板
- 针对网页端克重录入：在工人 Windows 电脑上以本地服务监听电子秤串口并内嵌 WebSocket 服务，将重量推送到浏览器客户端，在光标所在输入框自动填入，减少读数再手敲的环节与输错风险，便于连续称重换料
- 使用 Spring Boot 和 .NET/C# 开发后端微服务，实现设备通信
- 实现 Windows 服务用于串口通信和实时设备监控
- 管理10多个制造基地的完整系统部署和维护
- 部署由长期以手动复制/同步为主，演进为 Jenkins 对接 GitLab 的 CI/CD 流水线；前期配置与打通成本较高，先在工厂项目试点验证，后续各交付线统一迁移至同一套流程，提升可重复性并降低人为漏操作
- 缺乏现成对标时以现场驱动：深入车间理解工人与工厂需求，快速原型迭代澄清模糊诉求，经多轮大版本演进，随真实使用增加或精简功能
- >-
  生产库随任务表等业务表快速增长（任务表日增量约十万级、约半年达百万级量级），大量界面查询关联该表导致门户查询变慢并影响现场使用。
  在“停功能做深度优化”与“不停则现场持续受影响、新功能亦承压”之间做权衡：阶段性将 MySQL 迁至云端托管并提升规格，辅以主库+只读副本等读写分流缓解查询压力；
  先保障在研功能交付，再在后续窗口做慢查询与结构/索引等根治；优化完成后再回迁本地以降低持续运营成本（云端阶段成本上升为可接受的交换）。
- >-
  在双周 Sprint 之外叠加日常节奏：晨间站会对齐当日计划；下班前扫任务板看完成与阻塞；鼓励卡住即早求助，避免周末才爆 surprise
- >-
  在 GitLab/Jenkins CI/CD 之上叠加工程习惯：CI/静态扫描门禁低级问题；MR 走结对或交叉评审再合 main；大版本对高风险 diff 做 spot-check；
  新人 onboarding 用短 checklist + 常见规范基线（如《阿里巴巴 Java 开发手册》）+ Spring/Spring Cloud 约定优于配置
- >-
  约 6 人跨职能团队内的辅导：30/60/90 定性里程碑、周集成 demo 作为可见进度条、教练式 code review（给方向、由 junior 落实现）、
  定时关注 junior 与 MR/提交质量，而非只看工单数
- >-
  定期内部技术分享：绑定真实试点或已落地工具，讲清解决的问题、优势与不该用的边界；短会 + Q&A，减少「只在 review 里第一次听说」的摩擦
