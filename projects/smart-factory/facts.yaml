summary: >
  Full value-chain smart manufacturing platform connecting customers/brands,
  factories, and workers. Supports order intake, factory allocation,
  per-garment production tracking, and shipment synchronization across
  5+ manufacturing sites. Also includes electronic scale weighing integration
  through serial communication and Windows service monitoring, with real-time
  synchronization to web pages and backend business systems.

highlights:
  - Designed and implemented backend microservices with Spring Boot
  - Managed CI/CD and deployment via Docker, Jenkins, and Nginx
  - Integrated RFID, barcode scanners, and conveyor systems
  - Integrated electronic scales with serial data acquisition pipeline
  - Implemented Windows service for serial monitoring and auto-reconnect
  - Synchronized weighing data to web dashboards and business systems
  - Led 6-person cross-functional team across Android, backend, and hardware
  - Deployed across 5+ manufacturing bases
  - Maintained 99.9% uptime
  - Improved production efficiency by 30%+

