summary: >
  Led Android performance optimization across multiple enterprise applications, focusing on
  cold start reduction, memory optimization, ANR elimination, and OOM prevention. Built
  profiling and monitoring tooling to systematically identify and resolve performance
  bottlenecks across diverse Android device ecosystems.
highlights:
  - Reduced app cold start time through systematic analysis of startup path, lazy initialization, and background task deferral strategies
  - Resolved OOM crashes by implementing memory profiling, bitmap optimization, memory leak detection, and reference management patterns across 8+ production apps
  - Eliminated ANR scenarios through main thread offloading, IO optimization, and binder transaction analysis
  - Built in-app performance monitoring infrastructure tracking startup metrics, frame rate, memory usage, and crash rate across device models and OS versions
  - Optimized APK size through resource shrinking, ProGuard/R8 rules, dynamic delivery, and modularization
  - Applied rendering optimization including GPU overdraw reduction, layout hierarchy flattening, and RecyclerView recycling improvements
  - Developed automated performance regression detection integrated into CI/CD pipeline
