features:
- Category creation and management for herb classes
- Image data upload and annotation workflow
- Annotation quality review and dispute handling
- Model training task orchestration with configurable hyperparameters
- Model evaluation with aggregate and per-class metrics
- Inference service for herb recognition with confidence output
- Model version management, A/B comparison, and rollback
- Low-confidence sample feedback to re-annotation queue
- Reusable workflow for future domain extension
