summary: 'Platform-style AI project that uses traditional Chinese medicine recognition
  as a sample scenario. Users can create categories, annotate image data, train classification
  models, test model quality, and run recognition inference with published model versions,
  forming a closed-loop data-to-model iteration workflow.

  '
highlights:
- Designed end-to-end AI platform workflow from category setup to recognition inference
- Implemented category management for custom herbal classification tasks
- Built image annotation process for supervised dataset generation
- Added model training pipeline with experiment tracking and model registry
- Added testing and evaluation process with release-gate criteria
- Connected trained models to practical TCM recognition usage
- Designed versioned model publishing and rollback capability
- Designed platform architecture for extension to more visual classification domains
