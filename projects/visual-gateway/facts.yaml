  Industrial IoT visualization gateway supporting multiple protocols 
  (Modbus, MQTT, HTTP) with real-time data monitoring, alerting, 
  and visualization dashboards. Deployed in factories and buildings.

highlights:
  - Designed multi-protocol industrial IoT gateway architecture
  - Supports 10+ protocols including Modbus, MQTT, and HTTP
  - Implemented edge computing and data preprocessing logic
  - Developed real-time data visualization dashboards
  - Built comprehensive alert management and multi-channel notification system
  - Supported 1,000+ device connections per single gateway
  - Achieved millisecond-level latency from data collection to display

