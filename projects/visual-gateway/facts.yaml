summary: >
  Gateway-centric breaker control platform: multiple non-networked circuit breakers
  connect to gateway via RS485/RS232 serial bus, and the gateway provides telemetry
  collection, open/close control, local alerting, and cloud reporting for unified
  web/mobile monitoring across factories and buildings.

highlights:
  - Designed serial breaker-to-gateway control architecture (RS485/RS232)
  - Enabled remote open/close control for non-networked circuit breakers
  - Implemented per-breaker telemetry collection (current/voltage/power/energy/status)
  - Built gateway-to-cloud telemetry uplink and centralized control console
  - Developed alert rules for overcurrent, over/undervoltage, leakage, and offline
  - Added local cache/retry/offline buffering for unstable network scenarios
  - Supported multi-gateway and multi-site centralized operations

