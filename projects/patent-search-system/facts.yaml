summary: >
  A comprehensive .NET-based Windows desktop application for enterprise patent document management.
  Built on .NET Framework 2.0 with C# 3.0, featuring Windows Forms 2.0 UI, SQL Server 2008 backend,
  and Lucene.NET 2.9 full-text search engine. The system enabled research teams to efficiently
  manage 10,000+ patent records with Excel batch processing capabilities and sub-second search response.
  Demonstrated early adoption of Microsoft technology stack including ADO.NET 2.0 data access patterns,
  enterprise application architecture, and desktop UI development patterns in the .NET 2.x era.

highlights:
  - Built enterprise desktop application on .NET Framework 2.0 with C# 3.0 and Windows Forms 2.0
  - Designed SQL Server 2008 database schema with optimized indexing for .NET 2.0 data access
  - Implemented ADO.NET 2.0 data access layer with connection pooling and transaction support
  - Integrated Lucene.NET 2.9 for high-performance full-text patent search (<2s response)
  - Developed Excel import/export using EPPlus library compatible with .NET 2.0
  - Created Windows Forms 2.0 UI with data binding, validation, and layered architecture patterns

