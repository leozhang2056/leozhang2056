summary: >
  ChatClothes is a modular and multimodal virtual try-on system that integrates 
  controllable diffusion-based generation with dialogue-driven garment interaction. 
  The system employs DeepSeek LLM for natural language instruction understanding, 
  LoRA fine-tuning for enhanced OOTDiffusion performance, ComfyUI for visual 
  workflow orchestration, and YOLO12n-LC for efficient garment classification. 
  Optimized for edge deployment with complete offline capability.

highlights:
  - Designed and implemented complete multimodal VTON system independently
  - Developed YOLO12n-LC lightweight classifier for edge deployment
  - Applied LoRA fine-tuning to OOTDiffusion for enhanced pose alignment and texture reconstruction
  - Integrated DeepSeek LLM for natural language control and dialogue-driven interaction
  - Built orchestration pipeline using Dify + ComfyUI + Ollama
  - Validated system on DressCode and VITON-HD datasets
  - Completed full-stack AI solution 6 months ahead of schedule

