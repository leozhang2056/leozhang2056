summary: >
  Smart power platform for factories and buildings: onboard gateways, switches, and meters; monitor
  per-load electrical parameters (current, voltage, power, energy); remote control and alarm policies.
  Delivered Java services plus an Android app for live monitoring with sub-second alarm handling.
highlights:
- Ran Java services for multi-site power monitoring under long-lived production load
- Shipped Android app for live energy readouts and sub-second alarm escalation
- Wired Modbus/RS485 gateways and smart meters into the telemetry path
- Produced Android gateway software bridging field devices to monitoring services
- Exposed consumption dashboards and analytics for site operators
- Held sub-second alarm response time under production alerting rules
