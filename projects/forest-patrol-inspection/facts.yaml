summary: 'Mobile forest patrol system for no-signal field scenarios. Supports offline
  map loading, GPS route recording, GIS point annotation, and incident reporting (fire/pest/other
  risks), with deferred synchronization when network is available.

  '
highlights:
- Focused on Android mobile client development for weak-network and offline forest
  environments
- Implemented continuous GPS trajectory recording and local route storage
- Integrated offline map package loading for no-signal patrol navigation
- Implemented GIS-based risk point annotation and incident reporting
- Added deferred data upload and auto-sync after reconnecting to network
- Supported fire hazard, pest risk, and other field event reporting workflows
