  risks), with deferred synchronization when network is available. Delivered and iterated over a
  1-year product lifecycle for field operations in low-connectivity environments.

  '
highlights:
  - Delivered offline-first Android GIS for forest patrol in no-signal areas: custom offline maps, GPS tracks, GIS annotations, and fire/pest/risk reporting over a one-year cycle
  - Integrated GDAL, Geos, and Shapely for geospatial data processing, map rendering, and spatial analysis in field inspection workflows
  - Synced patrol and incident data after connectivity returned, keeping field workflows aligned with regional forestry operations
