summary: >
  Intelligent service robot for exhibitions and shopping malls (primarily 2019).
  Provides guided tours, voice interaction (ASR/TTS), face recognition, and 
  autonomous navigation. Built when AI was less mature—rule-based and API-driven 
  rather than LLM/deep-learning; supports multi-modal interaction and customizable content.

highlights:
  - Developed Android interaction interface and voice dialogue system
  - Integrated ROS for autonomous navigation and path planning
  - Implemented LiDAR-based SLAM for mapping and localization
  - Integrated ASR (Speech Recognition) and TTS (Text-to-Speech)
  - Developed face recognition for VIP greeting and attendance tracking
  - Achieved centimeter-level navigation precision
  - Enabled 7x24 continuous service capability for exhibitions

