summary: '2020 digital signage ad delivery project. As project manager and Android
  screen client lead developer, delivered a centralized platform to control elevator,
  in-store, and public screens, using MQTT broadcast for large-scale campaign task
  delivery and scheduled video/image playback.

  '
highlights:
- Led project delivery and cross-team coordination as project manager
- Developed Android player clients across elevator/store/public screen scenarios
- Implemented MQTT broadcast-based campaign task distribution
- Built device grouping and campaign policy control for targeted delivery
- Implemented scheduled playback for image/video materials
- Added client heartbeat and playback status feedback for operational visibility
- Supported remote publishing and campaign adjustment without on-site operation
- Implemented operation audit trails for publishing and policy changes
