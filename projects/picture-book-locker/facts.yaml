summary: 'Smart picture book locker system for schools and libraries providing  24/7
  self-service book borrowing. Features face recognition, QR code  scanning, UV disinfection,
  and intelligent cabinet control.

  '
highlights:
- Developed Android control system with face recognition and QR code borrowing
- Integrated hardware components including electromagnetic locks, LED strips, and
  disinfection modules
- Enabled 24/7 self-service book borrowing and returning
- Implemented built-in UV disinfection for returned books
- Successfully deployed in multiple schools with multi-cabinet networking support
- Achieved average borrowing time of less than 3 seconds
