summary: 'School and library smart-locker product: 24/7 self-service borrowing with cabinet-side
  Android control (locks, UV, sensors) and a separate borrower Android app. Face recognition,
  QR check-in, and multi-cabinet networking—distinct from fleet IoT switch/gateway work.'

summary_cn: '智能图书馆储物柜系统，为学校及图书馆提供24/7自助借书服务。
  开发储物柜硬件的安卓控制系统及用户使用的安卓客户端应用。
  具备人脸识别、二维码扫描和紫外线消毒功能。'
highlights:
- Programmed Android control stack for locker hardware (electromagnetic locks, UV disinfection, sensors)
- Shipped borrower-facing Android app for self-service check-out and return
- Combined face recognition and QR code scanning for authentication at the cabinet
- Sustained 24/7 self-service operation with stable multi-cabinet networking
- Extended deployments to additional schools and library sites
- >-
  After a colleague left, inherited their smart-locker backlog alongside legacy maintenance and new features while
  still carrying other project work; workload became infeasible for one owner. Re-balanced scope with leadership: split
  borrower-facing (To-C) Android client work to another engineer while retaining cabinet-side Android (host / hardware
  control) responsibilities, then coordinated handover so delivery stayed on track—escalated early rather than
  silently risking the milestone; reciprocated team support when others needed help

highlights_cn:
- 开发储物柜硬件的安卓控制系统（电磁锁、紫外线消毒、传感器）
- 构建用户借还书的安卓客户端应用
- 集成人脸识别和二维码扫描进行身份验证
- 实现24/7自助服务运营，支持多柜联网
- 部署于多所学校和图书馆
- >-
  同事离职后接手其绘本智能柜相关交付：遗留代码维护、新功能开发叠加本人其他项目并行，单人无法按期扛住全部。
  与主管/团队及早沟通后做范围拆分：将偏 To-C 的借还书客户端 Android 交由另一位同事承接，本人保留柜体主机侧
  （硬件控制、柜端 Android 等）开发与维护，协同完成交接与节奏对齐，避免以个人沉默拖累里程碑；团队内互相支援、
  以项目整体交付为先

