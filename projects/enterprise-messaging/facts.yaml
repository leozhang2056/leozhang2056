summary: 'Enterprise instant messaging platform organized into multiple core subsystems,
  including User Center, Message Center, and File System. Supports real-time communication
  across Android, Web, and PC clients with 10,000+ daily active users and sub-200ms
  message latency.

  '
highlights:
- Developed Android client using NDK-based TCP/UDP
- Built backend using Spring Cloud and Node.js
- Designed multi-subsystem architecture (User Center, Message Center, File System)
- Integrated distributed database and FastDFS file management system
- Built ETL pipelines with Kettle for message data warehousing and analytics
- Created PowerBI dashboards for real-time user behavior and system performance monitoring
- Generated operational reports using FineReport for business intelligence
- Achieved sub-200ms message latency
- Supported 10,000+ daily active users
- Processed 500K+ messages daily
- Implemented cross-terminal login (Web, PC, Android)
- Improved connection stability and performance
