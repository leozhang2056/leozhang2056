features:
- Real-time messaging
- Android background survival and wake-up strategy for better push timeliness
- Cross-platform support (Android, Web, PC)
- Low latency (<200ms)
- High throughput (500K+ messages/day)
- Native protocol implementation
- Cross-terminal login
- Connection stability optimization
- Session management
- Distributed file storage for message attachments and business documents (FastDFS-backed, self-hosted)
- Multi-subsystem collaboration (User Center, Message Center, File System)
- Shared identity and file services reused by integrated subsystems (attendance/check-in, engineering project management, finance approvals, hardware asset management, permission administration) after core IM and platform foundations matured
