name: Validate Knowledge Base

on:
  push:
    paths:
      - 'projects/**/facts.yaml'
      - 'kb/**/*.yaml'
  pull_request:
    paths:
      - 'projects/**/facts.yaml'
      - 'kb/**/*.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
    
    - name: Validate all facts.yaml files
      run: |
        python app/backend/validate.py
    
    - name: Check for data inconsistencies
      run: |
        python app/backend/kb_query.py projects > /dev/null && echo "✓ KB query test passed"
